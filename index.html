<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Manifest</title>

<style>
body {
  background: url("https://i.imgur.com/z4guq1U.jpeg") no-repeat center center fixed;
  background-size: cover;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}


.container {
  max-width:500px;
  margin:auto;
}

input, select, button {
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

button {
  background:#680885;
  color:white;
  font-weight:bold;
}

textarea {
  width:100%;
  height:300px;
  margin-top:15px;
  background:black;
  color:#680885;
  padding:10px;
  border-radius:8px;
}

#scriptsContainer,
#scriptNameContainer {
  display:none;
}

.actions {
  display:flex;
  gap:10px;
}
.actions button {
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<h2>Generador de Manifest</h2>

<input id="name" placeholder="Nombre del Addon o Textura">
<input id="desc" placeholder="Descripción">
<input id="author" placeholder="Autor">

<input id="version" placeholder="Versión (ej: 1.0.0) - opcional">

<select id="type" onchange="toggleScripts()">
  <option value="rp">Resource Pack</option>
  <option value="bp">Behavior Pack</option>
</select>

<div id="scriptsContainer">
  <label>
    <input type="checkbox" id="scripts" onchange="toggleScriptName()"> Agregar Scripts (selecciona si tu addon usa scripts)
  </label>
</div>


<div id="scriptNameContainer">
  <input id="scriptName" placeholder="Nombre del script (ej: main.js)">
</div>

<button onclick="generate()">Generar</button>

<div class="actions">
  <button onclick="copyJSON()">Copiar JSON</button>
  <button onclick="downloadJSON()">Descargar</button>
</div>

<textarea id="output" readonly></textarea>

</div>

<script>
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function toggleScripts() {
  const type = document.getElementById("type").value;
  document.getElementById("scriptsContainer").style.display =
    (type === "bp") ? "block" : "none";

  if (type !== "bp") {
    document.getElementById("scriptNameContainer").style.display = "none";
  }
}

function toggleScriptName() {
  const checked = document.getElementById("scripts").checked;
  document.getElementById("scriptNameContainer").style.display =
    checked ? "block" : "none";
}

function parseVersion(input) {
  if (!input) return [1,0,0];
  const parts = input.split(".").map(n => parseInt(n));
  if (parts.length !== 3 || parts.some(isNaN)) return [1,0,0];
  return parts;
}

function generate() {
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const author = document.getElementById("author").value;
  const versionInput = document.getElementById("version").value;
  const type = document.getElementById("type").value;
  const useScripts = document.getElementById("scripts").checked;

let scriptName = document.getElementById("scriptName").value.trim();

if (!scriptName) {
  scriptName = "main.js";
} else {

  if (!scriptName.endsWith(".js")) {
    scriptName += ".js";
  }
}

  const version = parseVersion(versionInput);

  const headerUUID = uuid();
  const moduleUUID = uuid();
  const dependencyUUID = uuid();

  let manifest = {
    format_version: 2,
    header: {
      name: name,
      description: desc,
      uuid: headerUUID,
      version: version,
      min_engine_version: [1,20,80]
    },
    metadata: {
      authors: [author],
      product_type: type === "bp" ? "addon" : "texture"
    }
  };

  if (type === "rp") {
    manifest.modules = [
      {
        type: "resources",
        uuid: moduleUUID,
        version: version
      }
    ];
  }

  if (type === "bp") {

    if (!useScripts) {
      manifest.modules = [
        {
          type: "data",
          uuid: moduleUUID,
          version: version
        }
      ];
    }

    if (useScripts) {
      manifest.modules = [
        {
          description: "JavaScript module",
          type: "script",
          language: "javascript",
          uuid: moduleUUID,
          version: version,
          entry: scriptName 
        }
      ];

      manifest.dependencies = [
        {
          module_name: "@minecraft/server",
          version: "1.11.0"
        },
        {
          uuid: dependencyUUID,
          version: version
        }
      ];
    }
  }

  document.getElementById("output").value =
    JSON.stringify(manifest, null, 2);
}

function copyJSON() {
  navigator.clipboard.writeText(
    document.getElementById("output").value
  );
  alert("JSON copiado");
}

function downloadJSON() {
  const text = document.getElementById("output").value;
  const blob = new Blob([text], { type: "application/json" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "manifest.json";
  a.click();
}
</script>

</body>
</html>
