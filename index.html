<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Manifest</title>

<style>
/* 💻 PC (por defecto) */
body {
  background: url("https://i.imgur.com/z4guq1U.jpeg") no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color: rgba(255,255,255,0);
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
}

/* 📱 MÓVIL */
@media (max-width: 600px) {
  body {
    background: url("https://i.imgur.com/tdiVvNP.jpeg") no-repeat center top;
    background-size: cover;
    background-attachment: scroll; /* 🔥 evita bug en celular */
  }
}

.container {
  max-width:500px;
  margin:auto;
}

select {
  width: 100%;
  padding: 12px;
  background: transparent; 
  border: 2px solid #680885;
  color: #00fbff;
  border-radius: 8px;
  outline: none;
  appearance: none; 
  -webkit-appearance: none;
  -moz-appearance: none;
}

button {
  background:#680885;
  color:#00fbff;
  font-weight:bold;
}

textarea {
  width:100%;
  height:300px;
  margin-top:15px;
  background:rgba(0, 255, 247, 0.549);
  color:#680885;
  padding:10px;
  border-radius:8px;
}

#scriptsContainer,
#scriptNameContainer {
  display:none;
}

.actions {
  display:flex;
  gap:10px;
}
.actions button {
  flex:1;
}

/* 🔥 INPUTS ANIMADOS */
.inputBox {
  position: relative;
  width: 100%;
  margin: 12px 0;
}

.inputBox input {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 2px solid #c800ff;
  color: #a200ff;
  border-radius: 8px;
  outline: none;
}

.inputBox span {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #00fbff;
  pointer-events: none;
  transition: 0.3s;
}

/* ANIMACIÓN */
.inputBox input:focus ~ span,
.inputBox input:valid ~ span {
  top: -8px;
  font-size: 12px;
  background: #1e1e1e00;
  padding: 0 5px;
  color: #00fbff;
}

.checkboxBox {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
  justify-content: flex-start;
}

.checkboxBox input {
  width: auto; /* 🔥 importante */
}

.checkboxBox label {
  cursor: pointer;
  color: #00fbff;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Generador de Manifest</h2>

<div class="inputBox">
  <input id="name" required>
  <span>Nombre del Addon</span>
</div>

<div class="inputBox">
  <input id="desc" required>
  <span>Descripción</span>
</div>

<div class="inputBox">
  <input id="author" required>
  <span>Autor</span>
</div>

<div class="inputBox">
  <input id="version" required>
  <span>Versión (ej: 1.0.0) - opcional</span>
</div>

<div class="inputBox">
  <input id="rpUUID" required>
  <span>UUID de Dependencia</span>
</div>

<select id="type" onchange="toggleScripts()">
  <option value="rp">Resource Pack</option>
  <option value="bp">Behavior Pack</option>
</select>

<div id="scriptsContainer" class="checkboxBox">
  <input type="checkbox" id="scripts" onchange="toggleScriptName()">
  <label for="scripts">
    Agregar Scripts (selecciona si tu addon usa scripts)
  </label>
</div>
<div id="subpacksContainer" class="checkboxBox">
  <input type="checkbox" id="useSubpacks" onchange="toggleSubpacks()">
  <label for="useSubpacks">
    Agregar Subpacks
  </label>
</div>

<div id="subpackInputs" style="display:none;">

  <div class="inputBox">
    <input id="subpack1_name">
    <span>Nombre del Subpack (ej: Chest)</span>
  </div>

  <div class="inputBox">
    <input id="subpack1_folder">
    <span>Folder Name (ej: chest)</span>
  </div>

  <div class="inputBox">
    <input id="subpack1_memory">
    <span>Memory Tier (0 o 1)</span>
  </div>

</div>


<div id="scriptNameContainer" class="inputBox">
  <input id="scriptName" required>
  <span>Nombre del script (ej: main.js)</span>
</div>
<button onclick="generate()">Generar</button>

<div class="actions">
  <button onclick="copyJSON()">Copiar JSON</button>
  <button onclick="downloadJSON()">Descargar</button>
</div>

<textarea id="output" readonly></textarea>

</div>

<script>
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function toggleScripts() {
  const type = document.getElementById("type").value;
  document.getElementById("scriptsContainer").style.display =
    (type === "bp") ? "block" : "none";

  if (type !== "bp") {
    document.getElementById("scriptNameContainer").style.display = "none";
  }
}

function toggleScriptName() {
  const checked = document.getElementById("scripts").checked;
  document.getElementById("scriptNameContainer").style.display =
    checked ? "block" : "none";
}

function parseVersion(input) {
  if (!input) return [1,0,0];
  const parts = input.split(".").map(n => parseInt(n));
  if (parts.length !== 3 || parts.some(isNaN)) return [1,0,0];
  return parts;
}

function generate() {
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const author = document.getElementById("author").value;
  const versionInput = document.getElementById("version").value;
  const type = document.getElementById("type").value;
  const useScripts = document.getElementById("scripts").checked;

  const rpUUID = document.getElementById("rpUUID").value.trim();

  let scriptName = document.getElementById("scriptName").value.trim();

  if (!scriptName) {
    scriptName = "main.js";
  } else if (!scriptName.endsWith(".js")) {
    scriptName += ".js";
  }

  const version = parseVersion(versionInput);

  const headerUUID = uuid();
  const moduleUUID = uuid();

  let manifest = {
    format_version: 2,
    header: {
      name: name,
      description: desc,
      uuid: headerUUID,
      version: version,
      min_engine_version: [1,20,80]
    }
  };

  // RESOURCE PACK
if (type === "rp") {
  manifest.modules = [
    {
      type: "resources",
      uuid: moduleUUID,
      version: version
    }
  ];

  // 🔥 DEPENDENCIES TAMBIÉN EN RP
  manifest.dependencies = [
    {
      uuid: document.getElementById("rpUUID").value.trim() || "",
      version: version
    }
  ];
}

  // BEHAVIOR PACK
  if (type === "bp") {

    // modules
    if (!useScripts) {
      manifest.modules = [
        {
          type: "data",
          uuid: moduleUUID,
          version: version
        }
      ];
    } else {
      manifest.modules = [
        {
          description: "JavaScript module",
          type: "script",
          language: "javascript",
          uuid: moduleUUID,
          version: version,
          entry: scriptName
        }
      ];
    }

    // 🔥 DEPENDENCIES SIEMPRE ACTIVAS
    manifest.dependencies = [];

    // 👉 scripts (si existen)
    if (useScripts) {
      manifest.dependencies.push({
        module_name: "@minecraft/server",
        version: "1.11.0"
      });
    }

    // 👉 RP UUID (aunque esté vacío)
    manifest.dependencies.push({
      uuid: rpUUID || "",
      version: version
    });

  }

if (document.getElementById("useSubpacks").checked) {
  manifest.subpacks = [
    {
      folder_name: document.getElementById("subpack1_folder").value || "default",
      memory_tier: parseInt(document.getElementById("subpack1_memory").value) || 0,
      name: document.getElementById("subpack1_name").value || "Subpack"
    }
  ];
}

  // 🔥 METADATA SIEMPRE AL FINAL
  manifest.metadata = {
    authors: [author],
    product_type: type === "bp" ? "addon" : "texture"
  };

  document.getElementById("output").value =
    JSON.stringify(manifest, null, 2);
}

function downloadJSON() {
  const text = document.getElementById("output").value;
  const blob = new Blob([text], { type: "application/json" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "manifest.json";
  a.click();
}
</script>

</body>
</html>
